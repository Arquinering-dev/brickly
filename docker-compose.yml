services:
  db:
    image: postgres:16-alpine
    container_name: brickly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: brickly
      POSTGRES_USER: brickly
      POSTGRES_PASSWORD: brickly
    ports:
      - "5434:5432"
    volumes:
      - brickly_pgdata:/var/lib/postgresql/data

volumes:
  brickly_pgdata:
